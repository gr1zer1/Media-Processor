on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Start database
        run: docker compose up -d db
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://user:password@db:5432/media_processor_test
        run: docker compose run --rm api pytest -v
