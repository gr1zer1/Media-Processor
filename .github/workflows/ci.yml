on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Prepare CI env file
        run: cp .env.example .env
      - name: Reset compose state
        run: docker compose down -v --remove-orphans || true
      - name: Start database
        run: docker compose up -d db
      - name: Run tests
        run: docker compose run --rm --build -e TEST_DATABASE_URL=postgresql+asyncpg://user:password@db:5432/media_processor_test api pytest -v
