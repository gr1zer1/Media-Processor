on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=user
          POSTGRES_PASSWORD=password
          POSTGRES_DB=media_processor
          DATABASE_URL=postgresql+asyncpg://user:password@db:5432/media_processor
          MEDIA_POSTGRES_USER=user
          MEDIA_POSTGRES_PASSWORD=password
          MEDIA_POSTGRES_DB=media_processor
          MEDIA_DATABASE_URL=postgresql+asyncpg://user:password@media_db:5432/media_processor
          JWT_SECRET_KEY=your_super_secret_key_here
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=15
          REFRESH_TOKEN_EXPIRE_DAYS=30
          REDIS_URL=redis://redis:6379
          MEDIA_REDIS_URL=redis://media_redis:6379
          MINIO_URL=minio:9000
          MINIO_ACCESS_KEY=admin
          MINIO_SECRET_KEY=password
          USER_SERVICE_URL=http://user_service:8001
          EOF
      - name: Start database
        run: docker compose up -d db
      - name: Run tests
        run: docker compose run --rm -e TEST_DATABASE_URL=postgresql+asyncpg://user:password@db:5432/media_processor_test api pytest -v
