
services:
  api:
    build: ./user_service/.
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - b_network
  media_api:
    build: ./media_service/.
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      media_db:
        condition: service_healthy
      media_redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - b_network

  db:
    image: postgres:16

    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - b_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  media_db:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${MEDIA_POSTGRES_PASSWORD}
      POSTGRES_USER: ${MEDIA_POSTGRES_USER}
      POSTGRES_DB: ${MEDIA_POSTGRES_DB}
    ports:
      - "5433:5432"
    networks:
      - b_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $MEDIA_POSTGRES_USER -d $MEDIA_POSTGRES_DB -h localhost",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - media_db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - b_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  media_redis:
    image: redis:7
    ports:
      - "6378:6379"
    networks:
      - b_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - b_network
    command: server /data --console-address ":9001"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  celery_worker:
    build: ./user_service/.
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      media_redis:
        condition: service_healthy
    networks:
      - b_network

networks:
  b_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  media_db_data:
    driver: local
  minio_data:
    driver: local